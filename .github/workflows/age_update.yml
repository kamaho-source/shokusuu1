name: Age Update

on:
  schedule:
    - cron: '0 15 31 3 *'   # JST 4月1日 0:00 に相当（UTC 3月31日 15:00）
  workflow_dispatch:          # 手動実行も可能

jobs:
  age-update:
    name: Annual Age Update
    runs-on: ubuntu-latest
    # 本番サーバー専用: main ブランチのみ実行
    if: github.ref == 'refs/heads/main'
    env:
      SLACK_USERNAME: DeployBot
      SLACK_ICON: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: SSH into production server and run age update
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            DB_USER=${{ secrets.DB_USER }} \
            DB_PASS=${{ secrets.DB_PASS }} \
            bash scripts/age_update.sh

      - name: Slack Notification on Success
        uses: rtCamp/action-slack-notify@v2
        if: ${{ success() }}
        env:
          SLACK_TITLE: Age Update / Success
          SLACK_COLOR: good
          SLACK_MESSAGE: 年齢更新完了しました✅

      - name: Slack Notification on Failure
        uses: rtCamp/action-slack-notify@v2
        if: ${{ failure() }}
        env:
          SLACK_TITLE: Age Update / Failure
          SLACK_COLOR: danger
          SLACK_MESSAGE: "<@${{ secrets.SLACK_MENTION_USER_ID }}> 年齢更新失敗しました😢"
