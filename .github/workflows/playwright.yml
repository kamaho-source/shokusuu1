name: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'テスト対象のベースURL (例: https://staging.example.com)'
        required: true
        type: string
      e2e_user:
        description: 'ログインユーザー名'
        required: true
        type: string
  schedule:
    # 毎朝 1:00 JST (UTC 16:00) にステージング環境でスモークテスト
    - cron: '0 16 * * *'

env:
  E2E_BASE_URL: ${{ inputs.base_url || vars.E2E_BASE_URL || '' }}
  E2E_USER: ${{ inputs.e2e_user || vars.E2E_USER || 'admin' }}
  E2E_PASS: ${{ secrets.E2E_PASS }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
          E2E_USER: ${{ env.E2E_USER }}
          E2E_PASS: ${{ env.E2E_PASS }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
