name: Deploy to Staging

on:
  push:
    branches:
      - 'develop'
  workflow_dispatch:

concurrency:
  group: deploy-to-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ── ① GitHub Actions でイメージをビルド & ghcr.io に push ─────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/kamakura-shokusu_web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── ② ステージングサーバーにデプロイ ──────────────────────────────────
  deploy:
    name: Deploy to Staging (stg.kamaho-shokusu.jp)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 40
    env:
      SLACK_USERNAME: DeployBot
      SLACK_ICON: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_SALT:           ${{ secrets.STG_APP_SALT }}
          DB_NAME:            ${{ secrets.STG_DB_NAME }}
          DB_USER:            ${{ secrets.STG_DB_USER }}
          DB_PASS:            ${{ secrets.STG_DB_PASS }}
          DB_ROOT_PASS:       ${{ secrets.STG_DB_ROOT_PASS }}
          OPENROUTER_API_KEY: ${{ secrets.STG_OPENROUTER_API_KEY }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          REPO_URL:           ${{ secrets.REPO_URL }}
          BRANCH:             ${{ github.ref_name }}
          DEPLOY_KEY:         ${{ secrets.STG_SSH_PRIVATE_KEY }}
          GHCR_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:          ${{ github.actor }}
        with:
          host:     ${{ secrets.STG_HOST }}
          username: ubuntu
          key:      ${{ secrets.STG_SSH_PRIVATE_KEY }}
          port:     22
          envs:     APP_SALT,DB_NAME,DB_USER,DB_PASS,DB_ROOT_PASS,OPENROUTER_API_KEY,RESEND_API_KEY,REPO_URL,BRANCH,DEPLOY_KEY,GHCR_TOKEN,GHCR_USER
          timeout:  60s
          command_timeout: 35m
          script: |
            set -euo pipefail

            # ── GitHub デプロイキー & ホスト鍵を設定 ───────────────────────
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            printf '%s\n' "${DEPLOY_KEY}" > ~/.ssh/github_deploy_key
            chmod 600 ~/.ssh/github_deploy_key
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
            printf 'Host github.com\n  IdentityFile ~/.ssh/github_deploy_key\n  StrictHostKeyChecking no\n' > ~/.ssh/config
            chmod 600 ~/.ssh/config

            DEPLOY_PATH="/home/ubuntu/shokusuu1"
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # ── リポジトリ取得 ─────────────────────────────────────────────
            if [ ! -d .git ]; then
              echo "[INIT] cloning $REPO_URL (branch: $BRANCH)"
              git clone --branch "$BRANCH" "$REPO_URL" .
            else
              echo "[UPDATE] fetching & resetting to origin/$BRANCH"
              git fetch origin --prune
              git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH" "origin/$BRANCH"
              git reset --hard "origin/$BRANCH"
            fi

            # ── .env 生成 (アプリ用) ────────────────────────────────────────
            printf 'OPENROUTER_API_KEY=%s\n' "${OPENROUTER_API_KEY}" \
              > src_web/kamaho-shokusu/.env

            # ── docker/.env.staging 生成 (Docker Compose 用) ───────────────
            printf 'STG_DB_NAME=%s\nSTG_DB_USER=%s\nSTG_DB_PASS=%s\nSTG_DB_ROOT_PASS=%s\n' \
              "${DB_NAME}" "${DB_USER}" "${DB_PASS}" "${DB_ROOT_PASS}" \
              > docker/.env.staging

            # ── app_local.php 生成 ─────────────────────────────────────────
            {
              echo "<?php"
              echo "return ["
              echo "    'debug' => true,"
              echo "    'Security' => ['salt' => '${APP_SALT}'],"
              echo "    'Datasources' => ["
              echo "        'default' => ["
              echo "            'host'     => 'stg_db',"
              echo "            'database' => '${DB_NAME}',"
              echo "            'username' => '${DB_USER}',"
              echo "            'password' => '${DB_PASS}',"
              echo "        ],"
              echo "    ],"
              echo "    'EmailTransport' => ["
              echo "        'default' => ["
              echo "            'className' => 'Smtp',"
              echo "            'host'      => 'smtp.resend.com',"
              echo "            'port'      => 465,"
              echo "            'username'  => 'resend',"
              echo "            'password'  => '${RESEND_API_KEY}',"
              echo "            'tls'       => true,"
              echo "            'client'    => null,"
              echo "        ],"
              echo "    ],"
              echo "    'Email' => ["
              echo "        'default' => ["
              echo "            'transport'     => 'default',"
              echo "            'from'          => ['no-reply@kamaho-shokusu.jp' => 'かまほ食数管理システム'],"
              echo "            'charset'       => 'utf-8',"
              echo "            'headerCharset' => 'utf-8',"
              echo "        ],"
              echo "    ],"
              echo "];"
            } > src_web/kamaho-shokusu/config/app_local.php

            # ── ghcr.io からイメージを pull & 起動 ────────────────────────
            cd docker
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            docker compose -f docker-compose.staging.yml --env-file .env.staging pull
            docker compose -f docker-compose.staging.yml --env-file .env.staging up -d --no-build --remove-orphans
            docker image prune -f

            # ── Composer install ───────────────────────────────────────────
            docker exec stg_web composer install --optimize-autoloader --working-dir=/var/www/html/kamaho-shokusu

            # ── tmp ディレクトリのパーミッション修正 ────────────────────────
            docker exec stg_web chmod -R 777 /var/www/html/kamaho-shokusu/tmp
            docker exec stg_web chmod -R 777 /var/www/html/kamaho-shokusu/logs

            # ── plugins.php が存在しない場合は生成 ───────────────────────────
            docker exec stg_web bash -c \
              "[ -f /var/www/html/kamaho-shokusu/config/plugins.php ] || \
               printf '<?php\nreturn [];\n' > /var/www/html/kamaho-shokusu/config/plugins.php"

            # ── SQL更新適用（sql/updates/*.sql を1回ずつ実行） ────────────────
            sleep 5
            cd /home/ubuntu/shokusuu1
            ./scripts/apply_sql_updates.sh stg_db "${DB_NAME}" root "${DB_ROOT_PASS}" sql/updates

            # ── マイグレーション失敗テーブルのクリーンアップ ───────────────────
            docker exec stg_db mysql -u root -p"${DB_ROOT_PASS}" "${DB_NAME}" \
              -e "DROP TABLE IF EXISTS t_contact_replies;" 2>/dev/null || true
            # phinxlog の実行済み記録も削除して再マイグレーションを強制
            docker exec stg_db mysql -u root -p"${DB_ROOT_PASS}" "${DB_NAME}" \
              -e "DELETE FROM phinxlog WHERE version = '20260501000000';" 2>/dev/null || true

            # ── CakePHP マイグレーション実行 ──────────────────────────────────
            docker exec stg_web php /var/www/html/kamaho-shokusu/bin/cake migrations migrate

            # ── キャッシュクリア ────────────────────────────────────────────
            docker exec stg_web php /var/www/html/kamaho-shokusu/bin/cake cache clear_all || true

            echo "✅ Staging deployed: $(git rev-parse --short HEAD) @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Slack Notification on Success
        uses: rtCamp/action-slack-notify@v2
        if: ${{ success() }}
        env:
          SLACK_TITLE: Staging Deploy / Success
          SLACK_COLOR: good
          SLACK_MESSAGE: "ステージングへのデプロイ完了🚀 branch: ${{ github.ref_name }}"

      - name: Slack Notification on Failure
        uses: rtCamp/action-slack-notify@v2
        if: ${{ failure() }}
        env:
          SLACK_TITLE: Staging Deploy / Failure
          SLACK_COLOR: danger
          SLACK_MESSAGE: "<@${{ secrets.SLACK_MENTION_USER_ID }}> ステージングデプロイ失敗しました😢 branch: ${{ github.ref_name }}"
