name: Investigate Staging

on:
  workflow_dispatch:

jobs:
  investigate:
    name: Investigate Staging DB & Containers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Investigate via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DB_NAME:      ${{ secrets.STG_DB_NAME }}
          DB_ROOT_PASS: ${{ secrets.STG_DB_ROOT_PASS }}
        with:
          host:     ${{ secrets.STG_HOST }}
          username: ubuntu
          key:      ${{ secrets.STG_SSH_PRIVATE_KEY }}
          port:     22
          envs:     DB_NAME,DB_ROOT_PASS
          timeout:  30s
          script: |
            echo "=== Docker コンテナ状態 ==="
            docker ps

            echo ""
            echo "=== RoomTransferScheduleService.php の d_effective_date 周辺 ==="
            docker exec stg_web grep -n "effective_date\|effectiveDate\|DateTimeInterface\|format(" \
              /var/www/html/kamaho-shokusu/src/Service/RoomTransferScheduleService.php | head -20

            echo ""
            echo "=== git log (最新3件) ==="
            cd /home/ubuntu/shokusuu1 && git log --oneline -3

            echo ""
            echo "=== 最新エラーログ ==="
            docker exec stg_web tail -20 /var/www/html/kamaho-shokusu/logs/error.log 2>&1
