name: Renew TLS Certificate

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renew:
    name: Renew cert on production
    runs-on: ubuntu-latest
    env:
      SLACK_USERNAME: DeployBot
      SLACK_ICON: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Run certbot renew on production host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "${{ secrets.PROD_SUDO_PASSWORD }}" | sudo -S certbot renew --quiet \
              --deploy-hook "docker exec network-reverse nginx -s reload"

      - name: Slack Notification on Success
        uses: rtCamp/action-slack-notify@v2
        if: ${{ success() }}
        env:
          SLACK_TITLE: Cert Renew / Success
          SLACK_COLOR: good
          SLACK_MESSAGE: TLS証明書の更新完了しました✅

      - name: Slack Notification on Failure
        uses: rtCamp/action-slack-notify@v2
        if: ${{ failure() }}
        env:
          SLACK_TITLE: Cert Renew / Failure
          SLACK_COLOR: danger
          SLACK_MESSAGE: TLS証明書の更新失敗しました😢
