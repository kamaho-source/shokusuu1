name: Deploy to Sakura VPS

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-to-vps
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SLACK_USERNAME: DeployBot
      SLACK_ICON: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          envs: REPO_URL,BRANCH,DB_NAME,DB_USER,DB_PASS,DB_ROOT_PASS,DB_CONTAINER,RESEND_API_KEY,SLACK_CONTACT_WEBHOOK
          script: |
            set -euo pipefail

            DEPLOY_PATH="/home/ubuntu/shokusuu1"
            BRANCH="${BRANCH:-main}"

            # デプロイ先へ移動（初回は空ディレクトリ想定）
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # 初回 clone or 既存更新
            if [ ! -d .git ]; then
              if [ -z "${REPO_URL:-}" ]; then
                echo "ERROR: secrets.REPO_URL が未設定です（例: git@github.com:oohashikazuyuki/shokusuu1.git）。" >&2
                exit 1
              fi
              echo "[INIT] cloning $REPO_URL (branch: $BRANCH)"
              git clone --branch "$BRANCH" "$REPO_URL" .
            else
              echo "[UPDATE] fetching & resetting to origin/$BRANCH"
              git fetch origin --prune
              git checkout "$BRANCH" || git checkout -b "$BRANCH"
              git reset --hard "origin/$BRANCH"
            fi

            # ── SQL更新適用（sql/updates/*.sql を1回ずつ実行） ────────────────
            echo "── Applying SQL migrations ──────────────────────────────────────"
            ./scripts/apply_sql_updates.sh \
              "${DB_CONTAINER}" \
              "${DB_NAME}" \
              root \
              "${DB_ROOT_PASS}" \
              sql/updates

            # ── plugins.php が存在しない場合は生成 ───────────────────────────
            PLUGINS_FILE="$DEPLOY_PATH/src_web/kamaho-shokusu/config/plugins.php"
            [ -f "$PLUGINS_FILE" ] || printf '<?php\nreturn [];\n' > "$PLUGINS_FILE"

            # ── CakePHP マイグレーション実行 ──────────────────────────────────
            echo "── Running CakePHP migrations ───────────────────────────────────"
            docker exec kamakura-shokusu_web php /var/www/html/kamaho-shokusu/bin/cake migrations migrate

            # ── アプリ用 .env に環境変数を注入（コンテナの env_file と同じパス） ──
            ENV_FILE="$DEPLOY_PATH/src_web/kamaho-shokusu/.env"
            touch "$ENV_FILE"
            for KEY_VAL in "RESEND_API_KEY=${RESEND_API_KEY}" "SLACK_CONTACT_WEBHOOK=${SLACK_CONTACT_WEBHOOK}"; do
              KEY="${KEY_VAL%%=*}"
              if grep -q "^${KEY}=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^${KEY}=.*|${KEY_VAL}|" "$ENV_FILE"
              else
                echo "${KEY_VAL}" >> "$ENV_FILE"
              fi
            done

            echo "✅ Deployed: $(git rev-parse --short HEAD) @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        env:
          REPO_URL:     ${{ secrets.REPO_URL }}
          BRANCH:       main
          DB_NAME:      ${{ secrets.DB_NAME }}
          DB_USER:      ${{ secrets.DB_USER }}
          DB_PASS:      ${{ secrets.DB_PASS }}
          DB_ROOT_PASS: ${{ secrets.DB_ROOT_PASS }}
          DB_CONTAINER:    ${{ secrets.DB_CONTAINER }}
          RESEND_API_KEY:          ${{ secrets.RESEND_API_KEY }}
          SLACK_CONTACT_WEBHOOK:   ${{ secrets.SLACK_CONTACT_WEBHOOK }}

      - name: Slack Notification on Success
        uses: rtCamp/action-slack-notify@v2
        if: ${{ success() }}
        env:
          SLACK_TITLE: Deploy / Success
          SLACK_COLOR: good
          SLACK_MESSAGE: デプロイ完了しました🚀

      - name: Slack Notification on Failure
        uses: rtCamp/action-slack-notify@v2
        if: ${{ failure() }}
        env:
          SLACK_TITLE: Deploy / Failure
          SLACK_COLOR: danger
          SLACK_MESSAGE: "<@${{ secrets.SLACK_MENTION_USER_ID }}> デプロイ失敗しました😢"
